<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuri Oliveira | Links</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #000000;
            --card-bg: #1a1a1a;
            --primary-text: #ffffff;
            --secondary-text: #a0a0a0;
            --border: #333333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--primary-text);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 50px 20px;
        }

        .bio-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid #fff;
            margin-bottom: 15px;
            object-fit: cover;
        }

        .profile-name {
            font-size: 1.3rem;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .profile-description {
            font-size: 0.9rem;
            color: var(--secondary-text);
            margin-bottom: 35px;
            line-height: 1.5;
        }

        .links-stack {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--primary-text);
            text-decoration: none;
            padding: 20px;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: 0.3s;
            display: block;
            width: 100%;
        }

        .link-card:hover {
            background-color: #ffffff;
            color: #000000;
            border-color: #ffffff;
            transform: translateY(-2px);
        }

        /* Destaque para o WhatsApp */
        .btn-whatsapp {
            background-color: #25d366;
            border: none;
            color: #fff;
            margin-top: 10px;
        }
        .btn-whatsapp:hover {
            background-color: #1eb954;
            color: #fff;
        }

        footer {
            margin-top: 60px;
            font-size: 0.65rem;
            color: #444;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="bio-container">
        <img src="basenovo.png" alt="Yuri Oliveira" class="profile-img">
        
        <h1 class="profile-name">Yuri Oliveira</h1>
        <p class="profile-description">
            IDENTIFICANDO E QUEBRANDO PADRÕES <br>
            QUE TRAVAM A SUA EVOLUÇÃO.
        </p>

        <div class="links-stack">
            
            <a href="constelacao.html" class="link-card">
                Constelação Familiar (R$ 149)
            </a>

            <a href="psicanalise.html" class="link-card">
                Psicanálise Espiritualista
            </a>

            <a href="index.html" class="link-card">
                Terapia de Vida Passada
            </a>

            <a href="https://api.whatsapp.com/send?phone=5512974118240&text=Olá%20Yuri,%20vi%20seu%20link%20no%20Instagram%20e%20gostaria%20de%20falar%20com%20você." class="link-card btn-whatsapp">
                Falar no WhatsApp
            </a>

        </div>

        <footer>
            Yuri Oliveira &copy; 2026
        </footer>
    </div>

</body>
</html>
